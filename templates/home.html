<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Catalog</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/home.css">
</head>

<body>

    <video autoplay muted loop id="bg-video">
        <source src="./static/video/backgroundvideo.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <header class="bar">
        <h1>🎶 Artist Catalog 🎶</h1>
    </header>

    <main class="main-container">
        <div class="band-grid">
            {{range .}}
            <div class="band-card" onclick="location.href='/band/{{.ID}}'">
                <div class="band-image">
                    <img src="{{.Image}}" alt="{{.Name}} Logo">
                </div>
                <div class="band-info">
                    <h2>{{.Name}}</h2>
                    <p>👥 Members: {{.MemberCount}}</p>
                    <p>🏁 Established: {{.CreationDate}}</p>
                    <p>🎤 Last Concert: {{.LastConcert}}</p>
                </div>
            </div>
            {{end}}
        </div>
    </main>


    <footer>
        <p>© 2025 Groupie Tracker 🎧 | Made by Jaber and Ahmed</p>
    </footer>

</body>
</html>
